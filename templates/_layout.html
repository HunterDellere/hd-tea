<link rel="stylesheet" href="{{REL}}style.css">
<script>
// Pre-paint theme: honor stored choice, else OS preference. Runs before
// first paint so there is no flash of the wrong register.
(function () {
  try {
    var t = localStorage.getItem('hd-tea-theme');
    if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
  } catch (e) { /* private mode: fall through to media query */ }
})();
</script>
</head>
