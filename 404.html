<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not found — hd-tea</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/icons/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/style.css">
<script>
(function () {
  try {
    var t = localStorage.getItem('hd-tea-theme');
    if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
  } catch (e) {}
})();
</script>
</head>
<body>
<main class="home-main">
  <header class="home-hero">
    <h1 class="home-title">Empty cup.</h1>
    <p class="home-sub">This page is not in the atlas. The leaf may have moved, or it was never picked.</p>
    <p style="margin-top:1.5rem"><a href="/">← Back to the atlas</a></p>
  </header>
</main>
</body>
</html>
